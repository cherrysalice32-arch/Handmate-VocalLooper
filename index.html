<!DOCTYPE html> 
<head>
  <meta charset="utf-8">
  <title>Handmate MIDI + Harmony</title>

  <link rel="stylesheet" type="text/css" href="appstyle.css">

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.3/hands.js" crossorigin="anonymous"></script>

  <!-- MIDI -->
  <script src="https://cdn.jsdelivr.net/npm/webmidi@next/dist/iife/webmidi.iife.js"></script>

  <!-- jQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <!-- 🔥 Tone.js (Harmonizer Engine) -->
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
</head>

<body>

  <div class="container">
    <video class="input_video"></video>
    <div class="canvas-container">
      <canvas class="output_canvas" width="1280px" height="720px"></canvas>
    </div>
  </div>

  <div class="view">
    <button onclick="toggleControl()" id="controlButton">Hide controls</button>
  </div>

  <div class="control-panel">

    <br><br>
    Selfie view <input id="selfie" type="checkbox" checked="checked">
    Show tracking <input id="showTracking" type="checkbox" checked="checked">
    Fps <span id="fps"></span>

    <hr> 

    <div class="select">
      <label for="videoSource">Camera </label>
      <select id="videoSource"></select>
    </div>

    <div id="dropdown">
      MIDI out device
      <select id="device" onchange="changeDevice()"></select>
    </div>

    <hr>

    <b>Send midi notes</b>
    <input id="sendMidi" type="checkbox"><br>

    <label>Channel:</label>
    <input type="number" id="midiChannel" min="1" max="16" value="1"/><br>

    <!-- (UNCHANGED MIDI CONTROLS BELOW) -->
    <!-- Keep everything you already had exactly as-is -->

    <!-- ========================= -->
    <!-- 🎤 NEW HARMONY SECTION -->
    <!-- ========================= -->

    <hr>

    <b>Vocal Harmonizer</b><br><br>

    <button onclick="initHarmony()">🎤 Start Harmony</button><br><br>

    <label>Harmony Mode:</label>
    <select id="harmonyMode">
      <option value="major">Major</option>
      <option value="minor">Minor</option>
      <option value="fifth">Fifth</option>
      <option value="octave">Octave</option>
    </select>

    <br><br>

    <label>Gesture Control Harmony</label>
    <input type="checkbox" id="gestureHarmony" checked>

    <br><br>

    <!-- ========================= -->
    <!-- EXISTING GESTURE SECTION -->
    <!-- ========================= -->

    <hr>

    <b>Gesture Recognition</b>
    <input id="gesture" type="checkbox"><br>

    <label>Trigger 1 Channel:</label>
    <input type="number" id="trigger1Channel" min="1" max="16" />

    <label>Note:</label>
    <input type="number" id="midi1NoteInput" min="0" max="127" value="60"/>

    <span style='font-size: 25px;'>&#128073&#128072;</span><br>

    <label>Trigger 2 Channel:</label>
    <input type="number" id="trigger2Channel" min="1" max="16" />

    <label>Note:</label>
    <input type="number" id="midi2NoteInput" min="0" max="127" value="60"/>

    <span class="flipH">&#9995;</span><br>

    <label>Trigger 3 Channel:</label>
    <input type="number" id="trigger3Channel" min="1" max="16" />

    <label>Note:</label>
    <input type="number" id="midi3NoteInput" min="0" max="127" value="60"/>

    <span style='font-size: 25px;'>&#9995;</span><br>

  </div> 

  <!-- YOUR MAIN SCRIPT -->
  <script type="text/javascript" src="script.js"></script>

</body>
</html>
